name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decp-web-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: decp-web-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - content-service
          - notification-service
          - chat-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install service dependencies
        run: npm ci

      - name: Syntax check backend source
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check
